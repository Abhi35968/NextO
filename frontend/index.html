<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NestO — Login</title>
  <script>
    const t = localStorage.getItem('sos_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* Fix active tab — use accent color, not the old gradient */
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent
    }

    .tab {
      border: 1px solid var(--border);
      color: var(--text2);
      background: transparent
    }

    /* Fix cred-row hover — use accent-bg, not old purple */
    .cred-row:hover {
      background: var(--accent-bg)
    }

    .cred-row code {
      color: var(--accent)
    }
  </style>
</head>

<body>

  <!-- Theme toggle — top-right corner of page -->
  <button id="page-theme-btn" onclick="togglePageTheme()" title="Toggle theme" style="position:fixed;top:1rem;right:1rem;z-index:100;
         background:var(--bg2);border:1px solid var(--border);
         border-radius:6px;padding:.4rem;cursor:pointer;
         display:flex;align-items:center;color:var(--text2);
         transition:all .15s;line-height:0">
    <i id="page-theme-icon" data-lucide="sun" style="width:16px;height:16px;stroke-width:2"></i>
  </button>

  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <h1><span class="logo-dot"></span> NestO</h1>
        <p style="color:var(--text3);font-size:.8rem;margin-top:.3rem;text-align:center">Smart Housing Platform
        </p>
      </div>

      <div id="alert-container"></div>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input id="l-email" type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="l-pass" type="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" id="login-btn">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden" onsubmit="doRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input id="r-name" type="text" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="r-email" type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input id="r-phone" type="tel" class="form-control" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="r-pass" type="password" class="form-control" placeholder="Min. 6 characters" required
            minlength="6">
        </div>
        <button type="submit" class="btn btn-primary w-full">Create Account</button>
      </form>

      <!-- Demo credentials -->
      <div class="demo-creds">
        <p>Demo Accounts — click to fill</p>
        <div class="cred-row" onclick="fillCreds('admin@society.com','admin123')">
          <span style="color:var(--text2);font-size:.8rem">Admin</span>
          <code>admin@society.com / admin123</code>
        </div>
        <div class="cred-row" onclick="fillCreds('rahul@email.com','resident123')">
          <span style="color:var(--text2);font-size:.8rem">Resident</span>
          <code>rahul@email.com / resident123</code>
        </div>
        <div class="cred-row" onclick="fillCreds('guard@society.com','guard123')">
          <span style="color:var(--text2);font-size:.8rem">Security</span>
          <code>guard@society.com / guard123</code>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (getToken() && getUser()) window.location.href = '/dashboard.html';

    // Set correct icon on load
    function syncPageThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const icon = document.getElementById('page-theme-icon');
      if (icon) icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function togglePageTheme() {
      toggleTheme();
      syncPageThemeIcon();
    }

    syncPageThemeIcon();

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function fillCreds(email, pass) {
      document.getElementById('l-email').value = email;
      document.getElementById('l-pass').value = pass;
      switchTab('login');
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
      try {
        const form = new URLSearchParams();
        form.append('username', document.getElementById('l-email').value);
        form.append('password', document.getElementById('l-pass').value);
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: form
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
        const data = await res.json();
        setAuth(data.access_token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError(err.message);
        btn.innerHTML = 'Sign In'; btn.disabled = false;
      }
    }

    async function doRegister(e) {
      e.preventDefault();
      try {
        const data = await api('POST', '/api/auth/register', {
          name: document.getElementById('r-name').value,
          email: document.getElementById('r-email').value,
          phone: document.getElementById('r-phone').value || null,
          password: document.getElementById('r-pass').value,
        });
        setAuth(data.access_token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) { showError(err.message); }
    }
  </script>
</body>

</html>
